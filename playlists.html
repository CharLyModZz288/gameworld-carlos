<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlists - GameWorld</title>
  
  <!-- === PROTECCIÓN INMEDIATA CONTRA ACCESO DIRECTO === -->
  <script>
    (function() {
      // Mostrar loader visual inmediato
      const style = document.createElement('style');
      style.textContent = `
        body { margin: 0; background: #0a0a0f; overflow: hidden; }
        #auth-guard {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100vh;
          background: #0a0a0f;
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 10000;
          flex-direction: column;
        }
        .guard-spinner {
          width: 60px;
          height: 60px;
          border: 4px solid #00ffff33;
          border-top-color: #00ffff;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 20px;
        }
        .guard-text {
          color: #00ffff;
          font-family: 'Orbitron', sans-serif;
          font-size: 1.2rem;
          text-align: center;
        }
        .guard-subtext {
          color: #888;
          font-family: 'Orbitron', sans-serif;
          font-size: 0.9rem;
          margin-top: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
      `;
      document.head.appendChild(style);
      
      // Añadir el loader
      document.write(`
        <div id="auth-guard">
          <div class="guard-spinner"></div>
          <div class="guard-text">Verificando acceso</div>
          <div class="guard-subtext">Cargando tu experiencia musical...</div>
        </div>
      `);

      // Función para verificar autenticación
      function checkAuth() {
        try {
          // Buscar token de Supabase en localStorage y sessionStorage
          const supabaseToken = 
            localStorage.getItem('supabase.auth.token') || 
            sessionStorage.getItem('supabase.auth.token');
          
          // También verificar el usuario en localStorage (por compatibilidad)
          const usuario = localStorage.getItem('nombreUsuario');
          
          // Verificar cookies (por si acaso)
          const hasAuthCookie = 
            document.cookie.includes('sb-access-token') || 
            document.cookie.includes('supabase');
          
          // Registrar intento de acceso (para debug)
          console.log('🔐 Verificando acceso a playlists:', { 
            usuario: !!usuario, 
            tieneToken: !!supabaseToken,
            tieneCookie: hasAuthCookie 
          });

          // Si no hay token Y no hay usuario, redirigir
          if (!supabaseToken && !usuario && !hasAuthCookie) {
            console.log('❌ No hay sesión detectada - Redirigiendo a login');
            window.location.replace('/login.html?redirect=playlists.html');
            return false;
          }
          
          // Verificar expiración del token si existe
          if (supabaseToken) {
            try {
              const session = JSON.parse(supabaseToken);
              const expiresAt = session.expires_at || 
                               session.expiresIn || 
                               session?.currentSession?.expires_at;
              
              if (expiresAt && Date.now() > expiresAt * 1000) {
                console.log('❌ Token expirado');
                alert('⚠️ Sesión expirada. Por favor, inicia sesión nuevamente.');
                localStorage.clear();
                window.location.replace('/login.html');
                return false;
              }
            } catch (e) {
              console.warn('Error al verificar token:', e);
            }
          }

          // === ACCESO CONCEDIDO ===
          console.log('✅ Acceso a playlists concedido');
          
          // Remover el guardia y mostrar contenido
          setTimeout(() => {
            const guard = document.getElementById('auth-guard');
            if (guard) {
              guard.style.opacity = '0';
              guard.style.transition = 'opacity 0.3s ease';
              setTimeout(() => {
                guard.remove();
                document.body.style.overflow = 'auto';
                document.body.classList.add('auth-success');
              }, 300);
            }
          }, 500); // Pequeño retraso para asegurar verificación
          
          return true;
          
        } catch (error) {
          console.error('Error en verificación:', error);
          window.location.replace('/login.html');
          return false;
        }
      }
      
      // Ejecutar verificación
      checkAuth();
    })();
  </script>

  <!-- Tus estilos originales -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/playlist.css">
  
  <!-- Estilo adicional para ocultar contenido hasta verificar -->
  <style>
    .page-container {
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    body.auth-success .page-container {
      opacity: 1;
    }
    
    /* Estilos para el modal de audio mejorado */
    .modal-gradient-icon {
      font-size: 4rem;
      text-align: center;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .modal-track-title {
      font-size: 1.8rem;
      color: var(--primary);
      margin-bottom: 1rem;
      text-align: center;
    }
    
    .modal-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin: 1.5rem 0;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }
    
    .stat-item {
      text-align: center;
    }
    
    .stat-label {
      display: block;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .stat-value {
      color: var(--primary);
      font-weight: 600;
      font-size: 1.1rem;
    }
    
    .modal-source {
      color: var(--text-muted);
      font-size: 0.9rem;
      text-align: center;
      margin: 1rem 0;
      font-style: italic;
    }
    
    audio {
      width: 100%;
      margin-top: 1rem;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body style="overflow: hidden;">

    <div class="loader-circle"></div>
    <div id="loader-text">GameWorld</div>
  </div>

  <div class="page-container">

      <!-- NAVBAR -->
      <nav class="navbar">
        <h1 class="logo"><a href="index.html">GameWorld</a></h1>
        <div class="nav-links">

          <a href="index.html">Inicio</a>
          <a href="merch.html">Merchandising</a>
          <a href="sobre.html">Sobre Nosotros</a>
        </div>
      </nav>

      <!-- CONTENIDO PRINCIPAL -->
      <div class="main-content">
        <h2 class="page-title">Playlists Gamer</h2>
        <p class="page-subtitle">Explora música épica inspirada en tus juegos favoritos.</p>

        <!-- GRID DINÁMICO -->
        <div id="gridPlaylists" class="playlists-grid">
          <!-- Se llenará con JS -->
        </div>

        <!-- FOOTER -->
        <footer class="footer">
          <p>© 2025 GameWorld. Todos los derechos reservados.</p>
          <div class="footer-links">
            <a href="#">Política de privacidad</a>
            <a href="#">Términos de uso</a>
            <a href="#">Contacto</a>
          </div>
        </footer>
      </div>
    </div>
  </div>

  <!-- MODAL PLAYLIST -->
  <div id="modalPlaylist" class="modal hidden">
    <div class="modal-content">
      <button onclick="cerrarModal()" class="modal-close">✕</button>
      <div id="modalContenido" class="modal-info"></div>
    </div>
  </div>

  <!-- Script principal (modificado para trabajar con autenticación) -->
  <script type="module" src="js/playlist.js"></script>
</body>
</html>
