<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GameWorld - Login</title>
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div class="login-container">
    <h1 class="login-title">Iniciar Sesión</h1>

    <form id="loginForm" class="login-form">
      <div class="input-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" required>
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" required>
      </div>

      <button type="submit" class="btn-login-main">Entrar</button>

      <p id="errorText" class="error-text hidden"></p>
    </form>

    <!-- Contenedor para verificación de dos factores -->
    <div id="twoFactorContainer" class="two-factor-container hidden">
      <h3>🔐 Verificación de seguridad</h3>
      <p>Ingresa el código de 6 dígitos enviado a tu correo electrónico</p>
      <div class="input-group">
        <label for="twoFactorCode">Código de verificación</label>
        <input id="twoFactorCode" type="text" maxlength="6" placeholder="000000" autocomplete="off">
      </div>
      <div class="two-factor-buttons">
        <button id="verifyTwoFactorBtn" class="btn-login-main">Verificar</button>
        <button id="cancelTwoFactorBtn" class="btn-login-main btn-cancel">Cancelar</button>
      </div>
      <p id="twoFactorError" class="error-text hidden"></p>
    </div>

    <p class="register-text">
      ¿No tienes cuenta?
      <a href="register.html">Regístrate</a>
    </p>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
