<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merchandising - GameWorld</title>
  
  <!-- === PROTECCIÓN CONTRA ACCESO DIRECTO POR URL === -->
  <script>
    (function() {
      // Verificar si se accede directamente por URL o mediante navegación interna
      function checkDirectAccess() {
        try {
          // Obtener el referrer para saber de qué página viene
          const referrer = document.referrer;
          
          // Si no hay referrer o viene de fuera del sitio, es acceso directo por URL
          if (!referrer) {
            console.log('🔒 Acceso directo por URL detectado - Redirigiendo a index');
            window.location.replace('/index.html');
            return false;
          }
          
          // Verificar que el referrer sea de nuestro propio sitio
          const currentDomain = window.location.hostname;
          const referrerDomain = new URL(referrer).hostname;
          
          if (referrerDomain !== currentDomain) {
            console.log('🔒 Acceso desde dominio externo detectado - Redirigiendo a index');
            window.location.replace('/index.html');
            return false;
          }
          
          // Verificar que viene de una página válida de nuestra aplicación
          const allowedPages = ['index.html', 'catalogo.html', 'playlists.html', 'merch.html', 'sobre.html', 'perfil.html'];
          const referrerPath = new URL(referrer).pathname.split('/').pop() || 'index.html';
          
          if (!allowedPages.includes(referrerPath)) {
            console.log('🔒 Acceso desde página no autorizada - Redirigiendo a index');
            window.location.replace('/index.html');
            return false;
          }
          
          // Si pasa todas las verificaciones, mostrar el contenido
          console.log('✅ Acceso permitido - Navegación interna');
          
          // Mostrar el contenido
          document.addEventListener('DOMContentLoaded', function() {
            document.body.style.overflow = 'auto';
          });
          
          return true;
        } catch (error) {
          console.error('Error en verificación:', error);
          // En caso de error, permitir acceso (mejor falso positivo que bloquear a usuarios legítimos)
          return true;
        }
      }
      
      // Ejecutar verificación
      checkDirectAccess();
    })();
  </script>
  
  <!-- Tus estilos originales -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/merch.css">
  
  <!-- Estilo para loader de verificación -->
  <style>
    body {
      margin: 0;
      background: #0a0a0f;
        /* Fondo fijo */
  background-image: url(../Fotos/Fondo.jpg);
  background-repeat: no-repeat;      /* No repetir la imagen */
  background-size: cover;            /* Ajustar la imagen al tamaño de la pantalla */
  background-attachment: fixed;      /* Mantenerla fija al hacer scroll */
  background-position: center;       /* Centrar la imagen */
    }
    
    #access-check {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      transition: opacity 0.3s ease;
    }
    
    .check-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #00ffff33;
      border-top-color: #00ffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    body.access-allowed #access-check {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Loader de verificación -->
  <div id="access-check">
    <div class="check-spinner"></div>
  </div>

  <!-- TUS ELEMENTOS ORIGINALES -->
  <div class="side-left"></div>
  <div class="side-right"></div>

  <!-- LOADER (se mantiene) -->
  <div id="loader">
    <div class="loader-circle"></div>
    <div id="loader-text">GameWorld</div>
  </div>

  <div class="page-container">
    <div class="main-container">

      <!-- NAVBAR -->
      <nav class="navbar">
        <h1 class="logo"><a href="index.html">GameWorld</a></h1>
        <div class="nav-links">
          <a href="catalogo.html">Catálogo</a>
          <a href="playlists.html">Playlists</a>
          <a href="index.html">Inicio</a>
          <a href="sobre.html">Sobre Nosotros</a>
        </div>
      </nav>

      <!-- CONTENIDO PRINCIPAL -->
      <div class="main-content">
        <h2 class="page-title">Merchandising Exclusivo</h2>
        <p class="page-subtitle">Colecciona figuras, camisetas y objetos únicos de tus sagas favoritas.</p>

        <!-- GRID DE PRODUCTOS -->
        <div id="gridMerch" class="merch-grid">
          <!-- Se llenará con JS -->
        </div>

        <!-- FOOTER -->
        <footer class="footer">
          <p>© 2025 GameWorld. Todos los derechos reservados.</p>
          <div class="footer-links">
            <a href="#">Política de privacidad</a>
            <a href="#">Términos de uso</a>
            <a href="#">Contacto</a>
          </div>
        </footer>
      </div>
    </div>
  </div>

  <!-- MODAL ZOOM -->
  <div id="modalZoom" class="modal hidden">
    <div class="modal-content merch-modal">
      <button id="cerrarZoom" class="modal-close">✕</button>
      <div class="modal-merch-content">
        <img id="zoomImagen" src="" alt="Producto" class="modal-merch-image">
        <h3 id="zoomTitulo" class="modal-merch-title"></h3>
        <p id="zoomDescripcion" class="modal-merch-description"></p>
        <p id="zoomPrecio" class="modal-merch-price"></p>
        <div id="zoomStockContainer" style="display: flex; justify-content: space-between; align-items: center; margin: 1rem 0;">
          <span style="color: var(--text-muted);">Stock disponible:</span>
          <span id="zoomStock" class="modal-merch-stock-value">10</span>
        </div>
        <span id="zoomStockText" class="modal-merch-stock-text"></span>
        <button id="comprarBtn" class="merch-button" style="width: 100%; margin-top: 1rem;">COMPRAR AHORA</button>
      </div>
    </div>
  </div>

  <!-- Script principal -->
  <script type="module" src="js/merch.js"></script>
  
  <!-- Script para quitar el loader de verificación -->
  <script>
    window.addEventListener('load', function() {
      document.body.classList.add('access-allowed');
    });
  </script>
</body>
</html>
