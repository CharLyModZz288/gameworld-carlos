<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merchandising - GameWorld</title>

  <!-- Fuentes de Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- HOJA DE ESTILO CORRECTA: merch.css -->
  <link rel="stylesheet" href="css/merch.css">

</head>
<body>
  <!-- Loader de verificación -->
  <div id="access-check">
    <div class="check-spinner"></div>
  </div>

  <!-- Elementos decorativos laterales -->
  <div class="side-left"></div>
  <div class="side-right"></div>

  <!-- LOADER PRINCIPAL -->
  <div id="loader">
    <div class="loader-circle"></div>
    <div id="loader-text">GameWorld</div>
  </div>

  <div class="page-container">
    <div class="main-container">

      <!-- NAVBAR (IDÉNTICO) -->
      <nav class="navbar">
        <h1 class="logo"><a href="index.html">GameWorld</a></h1>
        <div class="nav-links">
          <a href="catalogo.html">Catálogo</a> <!-- Enlace a Catálogo -->
          <a href="playlists.html">Playlists</a>
          <a href="index.html">Inicio</a>
          <a href="sobre.html">Sobre Nosotros</a>
          <a href="carrito.html" class="cart-link-nav" id="carrito" style="display: none;">
            🛒 Carrito
            <span id="carrito-contador-nav" class="carrito-contador-nav">0</span>
          </a>
        </div>
      </nav>

      <!-- CONTENIDO PRINCIPAL -->
      <div class="main-content">
        <!-- TÍTULO Y SUBTÍTULO ADAPTADOS -->
        <h2 class="page-title">Merchandising Exclusivo</h2>
        <p class="page-subtitle">Colecciona figuras, camisetas y objetos únicos de tus sagas favoritas.</p>

        <!-- GRID DE PRODUCTOS - El ID es 'gridMerch' tal y como lo usa merch.js -->
        <div id="gridMerch" class="merch-grid">
          <p class="loading-text">Cargando productos...</p>
        </div>

        <!-- FOOTER (IDÉNTICO) -->
        <footer class="footer">
          <p>© 2025 GameWorld. Todos los derechos reservados.</p>
          <div class="footer-links">
            <a href="#">Política de privacidad</a>
            <a href="#">Términos de uso</a>
            <a href="#">Contacto</a>
          </div>
        </footer>
      </div>
    </div>
  </div>

  <!-- MODAL DETALLE (IDÉNTICO ESTRUCTURA) -->
  <div id="modalProducto" class="modal hidden">
    <div class="modal-content">
      <button onclick="cerrarModal()" class="modal-close">✕</button>
      <div id="modalContenido"></div>
    </div>
  </div>

  <!-- SCRIPT PRINCIPAL: merch.js (como módulo) -->
  <script type="module" src="js/merch.js"></script>

  <!-- Script para quitar el loader de verificación -->
  <script>
    window.addEventListener('load', function() {
      document.body.classList.add('access-allowed');
    });
  </script>
</body>
</html>
