<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos - GameWorld</title>
  
  <!-- Fuentes de Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- HOJA DE ESTILO -->
  <link rel="stylesheet" href="css/favoritos.css">

</head>
<body>
  <!-- Loader de verificación -->
  <div id="access-check">
    <div class="check-spinner"></div>
  </div>

  <!-- Elementos decorativos laterales -->
  <div class="side-left"></div>
  <div class="side-right"></div>

  <!-- LOADER PRINCIPAL -->
  <div id="loader">
    <div class="loader-circle"></div>
    <div id="loader-text">GameWorld</div>
  </div>

  <div class="page-container">
    <div class="main-container">

      <!-- NAVBAR (IGUAL QUE EN CATÁLOGO Y MERCH) -->
      <nav class="navbar">
        <h1 class="logo"><a href="index.html">GameWorld</a></h1>
        <div class="nav-links">
          <a href="index.html">Inicio</a>
          </a>
        </div>
      </nav>

      <!-- CONTENIDO PRINCIPAL -->
      <div class="main-content">
        <h2 class="page-title">Mis Favoritos</h2>
        <p class="page-subtitle">Tus juegos y productos guardados para más tarde</p>

        <!-- GRID DE FAVORITOS -->
        <div id="gridFavoritos" class="favorites-grid">
          <p class="loading-text">Cargando tus favoritos...</p>
        </div>

        <!-- FOOTER -->
        <footer class="footer">
          <p>© 2025 GameWorld. Todos los derechos reservados.</p>
          <div class="footer-links">
            <a href="#">Política de privacidad</a>
            <a href="#">Términos de uso</a>
            <a href="#">Contacto</a>
          </div>
        </footer>
      </div>
    </div>
  </div>

  <!-- MODAL DETALLE (IGUAL QUE EN CATÁLOGO Y MERCH) -->
  <div id="modalFavorito" class="modal hidden">
    <div class="modal-content">
      <button onclick="cerrarModal()" class="modal-close">✕</button>
      <div id="modalContenido"></div>
    </div>
  </div>

  <!-- SCRIPT PRINCIPAL -->
  <script type="module" src="js/favoritos.js"></script>

  <!-- Script para quitar el loader de verificación -->
  <script>
    window.addEventListener('load', function() {
      document.body.classList.add('access-allowed');
    });
  </script>
</body>
</html>
