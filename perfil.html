<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil - GameWorld</title>
  
  <!-- === PROTECCIÓN INMEDIATA CONTRA ACCESO DIRECTO === -->
  <script>
    (function() {
      // Mostrar un loader visual mientras verificamos
      const style = document.createElement('style');
      style.textContent = `
        body { margin: 0; background: #0a0a0f; overflow: hidden; }
        #auth-guard {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100vh;
          background: #0a0a0f;
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 10000;
        }
        .guard-spinner {
          width: 50px;
          height: 50px;
          border: 3px solid #00ffff33;
          border-top-color: #00ffff;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
      `;
      document.head.appendChild(style);
      
      // Añadir el loader
      document.write(`
        <div id="auth-guard">
          <div class="guard-spinner"></div>
        </div>
      `);

      // Función para verificar autenticación
      function checkAuth() {
        try {
          // Buscar token de Supabase en localStorage y sessionStorage
          const supabaseToken = 
            localStorage.getItem('supabase.auth.token') || 
            sessionStorage.getItem('supabase.auth.token');
          
          // También buscar tokens directos
          const accessToken = 
            localStorage.getItem('sb-access-token') ||
            sessionStorage.getItem('sb-access-token');
          
          // Verificar nombre de usuario (fallback)
          const nombreUsuario = localStorage.getItem('nombreUsuario');
          
          // Verificar cookies
          const hasAuthCookie = 
            document.cookie.includes('sb-access-token') || 
            document.cookie.includes('supabase');
          
          if (!supabaseToken && !accessToken && !hasAuthCookie && !nombreUsuario) {
            console.log('No hay sesión detectada - Redirigiendo a login');
            window.location.replace('/index.html');
            return false;
          }
          
          // Verificación adicional: comprobar si el token ha expirado
          if (supabaseToken) {
            try {
              const session = JSON.parse(supabaseToken);
              const expiresAt = session.expires_at || 
                               session.expiresIn || 
                               session?.currentSession?.expires_at;
              
              if (expiresAt && Date.now() > expiresAt * 1000) {
                console.log('Token expirado - Redirigiendo a login');
                window.location.replace('/login.html');
                return false;
              }
            } catch (e) {
              console.warn('Error al verificar token');
            }
          }
          
          // Autenticado, remover el guardia
          setTimeout(() => {
            const guard = document.getElementById('auth-guard');
            if (guard) {
              guard.style.opacity = '0';
              setTimeout(() => {
                guard.remove();
                document.body.style.overflow = 'auto';
              }, 300);
            }
          }, 100);
          
          return true;
        } catch (error) {
          console.error('Error en verificación:', error);
          window.location.replace('/login.html');
          return false;
        }
      }
      
      // Ejecutar verificación
      checkAuth();
    })();
  </script>
  
  <link rel="stylesheet" href="/css/perfil.css">
  
  <!-- Estilo adicional para ocultar contenido hasta verificar -->
  <style>
    .page-container {
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    body.auth-success .page-container {
      opacity: 1;
    }
  </style>
</head>
<body class="fade-in" style="overflow: hidden;">

  <!-- CONTENEDOR CENTRAL -->
  <div class="page-container">
    <div class="main-container">

      <!-- NAVBAR -->
      <nav class="navbar">
        <h1 class="logo">GameWorld</h1>

        <div class="nav-links">
          <a href="catalogo.html">Catálogo</a>

          <!-- USUARIO -->
          <div class="user-menu-container" id="user-menu-container">
            <button id="user-menu-button" class="user-button">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M5.121 17.804A8 8 0 0112 15a8 8 0 016.879 2.804M15 10a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              <span id="nombreUsuarioNav">Usuario</span>
            </button>

            <div id="user-menu" class="user-menu hidden">
              <a href="perfil.html">Perfil</a>
              <a href="#" id="cerrarSesion" class="logout">Cerrar sesión</a>
            </div>
          </div>
        </div>
      </nav>

      <!-- PERFIL -->
      <h2 class="profile-title">Mi Perfil</h2>

      <div class="profile-container">

        <!-- FOTO -->
        <div class="profile-photo">
          <img id="fotoPreview" src="media/default-profile.png" alt="Foto de perfil">

          <label class="upload-btn">
            Cambiar foto
            <input type="file" id="fotoPerfil" accept="image/*">
          </label>
        </div>

        <!-- FORMULARIO -->
        <form id="perfilForm" class="profile-form">

          <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="usuario@email.com">
          </div>

          <div class="form-group">
            <label>Biografía</label>
            <textarea id="bio" rows="4" placeholder="Cuéntanos sobre ti..."></textarea>
          </div>

          <button type="submit" class="save-btn">
            Guardar Cambios
          </button>
        </form>

      </div>

      <!-- SEPARADOR -->
      <div class="section-divider"></div>

      <!-- CAMBIO DE CONTRASEÑA -->
      <h3 class="password-title">Cambiar Contraseña</h3>

      <div class="password-container">
        <form id="passwordForm" class="password-form">
          <div class="form-group">
            <label>Nueva contraseña</label>
            <div class="password-input-wrapper">
              <input type="password" id="newPassword" placeholder="••••••••">
              <button type="button" class="toggle-password" data-target="newPassword">
                <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18">
                  <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
              </button>
            </div>
            <div class="password-strength" id="passwordStrength">
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
            <small class="password-hint">Mínimo 6 caracteres, incluye mayúscula y número</small>
          </div>

          <div class="form-group">
            <label>Confirmar nueva contraseña</label>
            <div class="password-input-wrapper">
              <input type="password" id="confirmPassword" placeholder="••••••••">
              <button type="button" class="toggle-password" data-target="confirmPassword">
                <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18">
                  <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
              </button>
            </div>
            <span class="password-match-message" id="passwordMatchMessage"></span>
          </div>

          <button type="submit" class="change-password-btn" id="changePasswordBtn">
            Cambiar Contraseña
          </button>
        </form>
      </div>

    </div>
  </div>

  <script src="js/perfil.js"></script>
</body>
</html>
