<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil - GameWorld</title>
  
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  
  <link rel="stylesheet" href="/css/perfil.css">
  
</head>
<body class="fade-in">

  <!-- Loader de verificación -->
  <div id="access-check">
    <div class="check-spinner"></div>
  </div>

  <!-- CONTENEDOR CENTRAL -->
  <div class="page-container">
    <div class="main-container">

      <!-- NAVBAR -->
      <nav class="navbar">
        <h1 class="logo"><a href="index.html">GameWorld</a></h1>

        <div class="nav-links">
          <a href="index.html">Inicio</a>
          <a href="catalogo.html">Catálogo</a>

          <!-- USUARIO -->
          <div class="user-menu-container" id="user-menu-container">
            <button id="user-menu-button" class="user-button">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M5.121 17.804A8 8 0 0112 15a8 8 0 016.879 2.804M15 10a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              <span id="nombreUsuarioNav">Usuario</span>
            </button>

            <div id="user-menu" class="user-menu hidden">
              <a href="perfil.html">Perfil</a>
              <a href="#" id="cerrarSesion" class="logout">Cerrar sesión</a>
            </div>
          </div>
        </div>
      </nav>

      <!-- PERFIL -->
      <h2 class="profile-title">Mi Perfil</h2>

      <div class="profile-container">

        <!-- FORMULARIO (SOLO DATOS DE TEXTO) -->
        <form id="perfilForm" class="profile-form">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="usuario@email.com">
          </div>

          <div class="form-group">
            <label>Biografía</label>
            <textarea id="bio" rows="4" placeholder="Cuéntanos sobre ti..."></textarea>
          </div>

          <button type="submit" class="save-btn">
            Guardar Cambios
          </button>
        </form>

      </div>

      <!-- SEPARADOR -->
      <div class="section-divider"></div>

      <!-- CAMBIO DE CONTRASEÑA -->
      <h3 class="password-title">Cambiar Contraseña</h3>

      <div class="password-container">
        <form id="passwordForm" class="password-form">
          
          <!-- NUEVO CAMPO: CONTRASEÑA ACTUAL -->
          <div class="form-group">
            <label>Contraseña Actual</label>
            <div class="password-input-wrapper">
              <input type="password" id="currentPassword" placeholder="••••••••" required>
              <button type="button" class="toggle-password" data-target="currentPassword">
                <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18">
                  <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label>Nueva contraseña</label>
            <div class="password-input-wrapper">
              <input type="password" id="newPassword" placeholder="••••••••" required>
              <button type="button" class="toggle-password" data-target="newPassword">
                <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18">
                  <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
              </button>
            </div>
            <div class="password-strength" id="passwordStrength">
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
              <div class="strength-bar"></div>
            </div>
            <small class="password-hint">Mínimo 6 caracteres, incluye mayúscula, número y carácter especial</small>
          </div>

          <div class="form-group">
            <label>Confirmar nueva contraseña</label>
            <div class="password-input-wrapper">
              <input type="password" id="confirmPassword" placeholder="••••••••" required>
              <button type="button" class="toggle-password" data-target="confirmPassword">
                <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18">
                  <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
              </button>
            </div>
            <span class="password-match-message" id="passwordMatchMessage"></span>
          </div>

          <button type="submit" class="change-password-btn" id="changePasswordBtn">
            Cambiar Contraseña
          </button>
        </form>
      </div>

      <!-- ========================= -->
      <!-- NUEVA SECCIÓN: MIS COMPRAS -->
      <!-- ========================= -->
      <div class="section-divider"></div>
      
      <h3 class="purchases-title">🛍️ Mis Compras</h3>
      
      <div class="purchases-container" id="purchasesContainer">
        <div class="loading-purchases">
          <div class="loading-spinner"></div>
          <p>Cargando tus compras...</p>
        </div>
      </div>

    </div>
  </div>

  <!-- Script para quitar el loader de verificación -->
  <script>
    window.addEventListener('load', function() {
      document.body.classList.add('access-allowed');
    });
  </script>

  <script src="js/perfil.js"></script>
</body>
</html>
