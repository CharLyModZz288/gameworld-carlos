<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - GameWorld</title>
  
  <!-- === PROTECCIÓN CONTRA ACCESO DIRECTO POR URL === -->
  <script>
    (function() {
      function checkDirectAccess() {
        try {
          const referrer = document.referrer;
          
          if (!referrer) {
            console.log('🔒 Acceso directo por URL detectado - Redirigiendo a index');
            window.location.replace('/index.html');
            return false;
          }
          
          const currentDomain = window.location.hostname;
          const referrerDomain = new URL(referrer).hostname;
          
          if (referrerDomain !== currentDomain) {
            console.log('🔒 Acceso desde dominio externo detectado - Redirigiendo a index');
            window.location.replace('/index.html');
            return false;
          }
          
          const allowedPages = ['index.html', 'catalogo.html', 'playlists.html', 'merch.html', 'sobre.html', 'perfil.html'];
          const referrerPath = new URL(referrer).pathname.split('/').pop() || 'index.html';
          
          if (!allowedPages.includes(referrerPath)) {
            console.log('🔒 Acceso desde página no autorizada - Redirigiendo a index');
            window.location.replace('/index.html');
            return false;
          }
          
          console.log('✅ Acceso permitido - Navegación interna');
          
          document.addEventListener('DOMContentLoaded', function() {
            document.body.style.overflow = 'auto';
          });
          
          return true;
        } catch (error) {
          console.error('Error en verificación:', error);
          return true;
        }
      }
      
      checkDirectAccess();
    })();
  </script>
  
  <!-- Tus estilos originales -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/catalogo.css">
  
  <!-- Estilo para loader de verificación -->
  <style>
    body {
      margin: 0;
      background: #0a0a0f;
      background-image: url(../Fotos/Fondo.jpg);
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
    }
    
    #access-check {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      transition: opacity 0.3s ease;
    }
    
    .check-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #00ffff33;
      border-top-color: #00ffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    body.access-allowed #access-check {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Loader de verificación -->
  <div id="access-check">
    <div class="check-spinner"></div>
  </div>

  <!-- TUS ELEMENTOS ORIGINALES -->
  <div class="side-left"></div>
  <div class="side-right"></div>

  <!-- LOADER (se mantiene) -->
  <div id="loader">
    <div class="loader-circle"></div>
    <div id="loader-text">GameWorld</div>
  </div>

  <div class="page-container">
    <div class="main-container">

      <!-- NAVBAR ACTUALIZADO CON CARRITO -->
      <nav class="navbar">
        <h1 class="logo"><a href="index.html">GameWorld</a></h1>
        <div class="nav-links">
          <a href="index.html">Inicio</a>
          <a href="playlists.html">Playlists</a>
          <a href="merch.html">Merchandising</a>
          <a href="sobre.html">Sobre Nosotros</a>
          <a href="carrito.html" class="cart-link-nav">
            🛒 Carrito
            <span id="carrito-contador-nav" class="carrito-contador-nav">0</span>
          </a>
        </div>
      </nav>

      <!-- CONTENIDO PRINCIPAL -->
      <div class="main-content">
        <h2 class="page-title">Catálogo de Videojuegos</h2>
        <p class="page-subtitle">Explora los títulos más recientes y reserva tus favoritos.</p>

        <!-- GRID DE JUEGOS -->
        <div id="gridJuegos" class="games-grid">
          <p class="loading-text">Cargando juegos...</p>
        </div>

        <!-- FOOTER -->
        <footer class="footer">
          <p>© 2025 GameWorld. Todos los derechos reservados.</p>
          <div class="footer-links">
            <a href="#">Política de privacidad</a>
            <a href="#">Términos de uso</a>
            <a href="#">Contacto</a>
          </div>
        </footer>
      </div>
    </div>
  </div>

  <!-- MODAL DETALLE -->
  <div id="modalJuego" class="modal hidden">
    <div class="modal-content">
      <button onclick="cerrarModal()" class="modal-close">✕</button>
      <div id="modalContenido"></div>
    </div>
  </div>

  <!-- Script principal -->
  <script type="module" src="js/script.js"></script>
  
  <!-- Script para quitar el loader de verificación -->
  <script>
    window.addEventListener('load', function() {
      document.body.classList.add('access-allowed');
    });
  </script>
</body>
</html>
