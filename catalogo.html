<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo - GameWorld</title>
  
  <!-- === PROTECCIÓN INMEDIATA CONTRA ACCESO DIRECTO === -->
  <script>
    (function() {
      // Mostrar un loader visual mientras verificamos (opcional pero mejora UX)
      const style = document.createElement('style');
      style.textContent = `
        body { margin: 0; background: #0a0a0f; overflow: hidden; }
        #auth-guard {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100vh;
          background: #0a0a0f;
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 10000;
        }
        .guard-spinner {
          width: 50px;
          height: 50px;
          border: 3px solid #00ffff33;
          border-top-color: #00ffff;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
      `;
      document.head.appendChild(style);
      
      // Añadir el loader
      document.write(`
        <div id="auth-guard">
          <div class="guard-spinner"></div>
        </div>
      `);

      // Función para verificar autenticación
      function checkAuth() {
        try {
          // Buscar token de Supabase en localStorage y sessionStorage
          const supabaseToken = 
            localStorage.getItem('supabase.auth.token') || 
            sessionStorage.getItem('supabase.auth.token');
          
          // También buscar tokens directos (por si usas otro método)
          const accessToken = 
            localStorage.getItem('sb-access-token') ||
            sessionStorage.getItem('sb-access-token');
          
          // Verificar cookies (por si acaso)
          const hasAuthCookie = 
            document.cookie.includes('sb-access-token') || 
            document.cookie.includes('supabase');
          
          if (!supabaseToken && !accessToken && !hasAuthCookie) {
            console.log('No hay sesión detectada - Redirigiendo a login');
            window.location.replace('/index.html');
            return false;
          }
          
          // Verificación adicional: comprobar si el token ha expirado
          if (supabaseToken) {
            try {
              const session = JSON.parse(supabaseToken);
              // Supabase guarda el token con diferentes estructuras
              const expiresAt = session.expires_at || 
                               session.expiresIn || 
                               session?.currentSession?.expires_at;
              
              if (expiresAt && Date.now() > expiresAt * 1000) {
                console.log('Token expirado - Redirigiendo a login');
                window.location.replace('/login.html');
                return false;
              }
            } catch (e) {
              console.warn('Error al verificar token, redirigiendo por seguridad');
              window.location.replace('/login.html');
              return false;
            }
          }
          
          // Autenticado, remover el guardia
          setTimeout(() => {
            const guard = document.getElementById('auth-guard');
            if (guard) {
              guard.style.opacity = '0';
              setTimeout(() => {
                guard.remove();
                document.body.style.overflow = 'auto';
              }, 300);
            }
          }, 100);
          
          return true;
        } catch (error) {
          console.error('Error en verificación:', error);
          window.location.replace('/login.html');
          return false;
        }
      }
      
      // Ejecutar verificación
      checkAuth();
    })();
  </script>
  
  <!-- Tus estilos originales -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/catalogo.css">
  
  <!-- Estilo adicional para ocultar contenido hasta verificar -->
  <style>
    .page-container {
      opacity: 0;
      transition: opacity 0.5s ease;
    }
    body.auth-success .page-container {
      opacity: 1;
    }
  </style>
</head>
